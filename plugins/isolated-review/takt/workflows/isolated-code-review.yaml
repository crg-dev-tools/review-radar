name: isolated-code-review
description: >-
  Isolated code review. A neutral gather step collects the review target, then
  the mandatory perspectives (correctness, regression, tests, security) plus an
  overall reviewer run as independent read-only sessions, each with its own
  session_key. A dedicated integration session then consolidates all reports into
  one finding list. No auto-fix: this workflow only produces review results.

workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true

max_steps: 10
initial_step: gather

steps:
  # Neutral target preparation. Collects the diff, purpose, and changed files so
  # every reviewer shares an identical, hypothesis-free target. Does NOT judge.
  - name: gather
    tags:
      - plan
    edit: false
    persona: planner
    provider_options:
      extends: review-readonly
    instruction: gather-review
    output_contracts:
      report:
        - name: review-target.md
          format: review-gather
    rules:
      - condition: Review target information gathered
        next: reviewers
      - condition: Cannot identify review target, insufficient info
        next: ABORT
        appendix: |
          Clarifications needed:
          - {Question 1}
          - {Question 2}

  # Independent reviewers. Each parallel sub-step is a separate session
  # (distinct session_key), read-only (edit:false + review-readonly), and receives
  # only the neutral target report plus its own perspective and output contract.
  # Siblings never see each other's findings; no parent hypotheses are injected.
  - name: reviewers
    tags:
      - review
    parallel:
      - name: correctness
        session_key: review-correctness
        tags:
          - review
        edit: false
        persona: coding-reviewer
        policy:
          - review
          - coding
        provider_options:
          extends: review-readonly
        instruction: review-coding
        output_contracts:
          report:
            - name: correctness-review.md
              format: coding-review-finding-contract
        rules:
          - condition: approved
          - condition: needs_fix

      - name: regression
        session_key: review-regression
        tags:
          - review
        edit: false
        persona: regression-reviewer
        policy:
          - review
        provider_options:
          extends: review-readonly
        instruction: review-regression
        output_contracts:
          report:
            - name: regression-review.md
              format: regression-review-finding-contract
        rules:
          - condition: approved
          - condition: needs_fix

      - name: tests
        session_key: review-tests
        tags:
          - review
        edit: false
        persona: testing-reviewer
        policy:
          - review
          - testing
        knowledge:
          - unit-testing
          - e2e-testing
        provider_options:
          extends: review-readonly
        instruction: review-test
        output_contracts:
          report:
            - name: tests-review.md
              format: testing-review-finding-contract
        rules:
          - condition: approved
          - condition: needs_fix

      - name: security
        session_key: review-security
        tags:
          - review
        edit: false
        persona: security-reviewer
        policy:
          - review
        knowledge: security
        provider_options:
          extends: review-readonly
        instruction: review-security
        output_contracts:
          report:
            - name: security-review.md
              format: security-review-finding-contract
        rules:
          - condition: approved
          - condition: needs_fix

      - name: overall
        session_key: review-overall
        tags:
          - review
        edit: false
        persona: pure-reviewer
        policy:
          - review
        provider_options:
          extends: review-readonly
        instruction: review-pure
        output_contracts:
          report:
            - name: overall-review.md
              format: pure-review-finding-contract
        rules:
          - condition: approved
          - condition: needs_fix

    # Single pass: whatever the reviewers conclude, go to the integration step.
    # No fix loop.
    rules:
      - condition: all("approved")
        next: consolidate
      - condition: any("needs_fix")
        next: consolidate

  # Dedicated integration session. This is the ONLY step that reads every
  # reviewer's report. Runs read-only in its own session; deduplicates, assigns
  # finding IDs, normalizes severity, and surfaces conflicts/minority opinions.
  # Does not overrule reviewers on the merits and never silently drops findings.
  - name: consolidate
    session_key: review-consolidate
    tags:
      - review
    edit: false
    persona: review-integrator
    policy:
      - review
    provider_options:
      extends: review-readonly
    pass_previous_response: false
    instruction: consolidate-findings
    output_contracts:
      report:
        - name: consolidated-findings.md
          format: consolidated-findings
    rules:
      - condition: Consolidation complete
        next: COMPLETE
